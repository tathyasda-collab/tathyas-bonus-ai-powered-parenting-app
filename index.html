<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="vite-env-check" content="%VITE_SUPABASE_URL%">
    <title>Tathyas AI-Powered Parenting Bonus App</title>
    <link rel="icon" href="https://i.ibb.co/0NDT9kq/Tathyas-Logo.png">
    
    <!-- Tailwind is compiled at build time; do not load CDN in production -->

    <style>
      /* Print-friendly styles for Meal Assistant */
      @media print {
        .no-print {
            display: none !important;
        }
        body {
            background-color: white !important;
        }
        /* Force dark mode styles back to light mode for printing */
        .printable-content, .printable-content * {
            color: black !important;
            background-color: white !important;
        }
        .printable-content table, .printable-content th, .printable-content td {
            border-color: #666 !important;
            border-width: 1px !important;
            border-style: solid !important;
        }
      }
    </style>

    <!-- stylesheet is imported by the app entry (index.tsx) so Vite will emit the
      built CSS file with a hashed name. Do not reference a fixed `/index.css`
      here or the production build may load a non-existent file. -->
    <!-- Vite entry: use the source module so Vite can bundle correctly -->
    <script type="module" crossorigin src="/index.tsx"></script>
</head>
<body>
  <div id="root">
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; font-size: 1.2rem; color: #555;">
      Loading application...
    </div>
  </div>

  <!--
    ================================================================
    STEP 3: APPLICATION ENTRY POINT
    ================================================================
    This is the magic part. `type="text/babel"` tells Babel to handle
    this file. `data-module` tells Babel to treat this file AND all
    of its imports/exports as proper ES Modules. Babel will then
    fetch and transpile the entire application tree, respecting the
    import map above.
    ================================================================
  -->
  <!-- Vite will load the module above during build; no runtime babel loader required -->

</body>
</html>
