<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tathyas AI-Powered Parenting Bonus App</title>
    <link rel="icon" href="https://i.ibb.co/0NDT9kq/Tathyas-Logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>

    <style>
      /* Print-friendly styles for Meal Assistant */
      @media print {
        .no-print {
            display: none !important;
        }
        body {
            background-color: white !important;
        }
        /* Force dark mode styles back to light mode for printing */
        .printable-content, .printable-content * {
            color: black !important;
            background-color: white !important;
        }
        .printable-content table, .printable-content th, .printable-content td {
            border-color: #666 !important;
            border-width: 1px !important;
            border-style: solid !important;
        }
      }
    </style>

    <!--
      ================================================================
      STEP 1: IMPORT MAP
      ================================================================
      This tells the browser where to find the application's main
      dependencies when it sees an "import" statement. We use a
      reliable ES Module CDN (esm.sh) for this.
      ================================================================
    -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "@google/genai": "https://esm.sh/@google/genai@0.14.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.44.2",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }
}
</script>
    
    <!--
      ================================================================
      STEP 2: BABEL STANDALONE (THE TRANSLATOR)
      ================================================================
      This script provides the in-browser translator. It will look
      for scripts with type="text/babel" and convert them from
      TSX/JSX into plain JavaScript that the browser can run.
      ================================================================
    -->
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root">
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; font-size: 1.2rem; color: #555;">
      Loading application...
    </div>
  </div>

  <!--
    ================================================================
    STEP 3: APPLICATION ENTRY POINT
    ================================================================
    This is the magic part. `type="text/babel"` tells Babel to handle
    this file. `data-module` tells Babel to treat this file AND all
    of its imports/exports as proper ES Modules. Babel will then
    fetch and transpile the entire application tree, respecting the
    import map above.
    ================================================================
  -->
  <script type="text/babel" data-module src="./index.tsx"></script>

<script type="module" src="/index.tsx"></script>
</body>
</html>
