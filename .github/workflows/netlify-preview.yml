name: Netlify Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Use the repo secret if set, otherwise fall back to the provided site ID (non-secret)
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID || '270db7c8-e504-4b17-bc74-164f9968b6db' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Install Netlify CLI (local)
        run: npm install netlify-cli --no-save

      - name: Deploy to Netlify (draft preview)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          echo "Deploying preview to Netlify (draft)..."
          deploy_output=$(npx netlify deploy --dir=dist --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --message "PR #${{ github.event.number }} - ${{ github.head_ref }}" --json)
          # Save deploy output as a multiline environment variable for later steps
          echo "DEPLOY_OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$deploy_output" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Post preview URL as PR comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployOutput = process.env.DEPLOY_OUTPUT;
            if (!deployOutput) {
              core.setFailed('No deploy output available');
            }
            let parsed;
            try {
              parsed = JSON.parse(deployOutput);
            } catch (e) {
              core.setFailed('Failed to parse deploy output JSON: ' + e.message);
            }
            const url = parsed.url || (parsed.deploy && (parsed.deploy.ssl_url || parsed.deploy.url)) || parsed.deploy_url || null;
            if (!url) {
              core.info('No URL found in deploy output');
            } else {
              const body = `Netlify preview deployed: ${url}`;
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
              core.info('Posted preview URL to PR: ' + url);
            }
